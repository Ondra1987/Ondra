  <script>
  // QR Import pokrmu
  (function() {
    var params = new URLSearchParams(window.location.search);
    var importData = params.get('importMeal');
    if (!importData) return;

    // Vyčistit URL
    history.replaceState({}, '', window.location.pathname);

    // Dekódovat data
    var meal;
    try {
      meal = JSON.parse(decodeURIComponent(escape(atob(importData))));
      if (!meal || !meal.name) throw new Error('Neplatná data');
    } catch(e) {
      console.error('QR import chyba:', e);
      return;
    }

    // Zkontrolovat zda pokrm již existuje
    function getCustomFoods() {
      try { return JSON.parse(localStorage.getItem('anet-favorites-v1') || '[]'); } catch(e) { return []; }
    }
    function saveCustomFoods(foods) {
      localStorage.setItem('anet-favorites-v1', JSON.stringify(foods));
    }

    // Vytvořit overlay panel
    var overlay = document.createElement('div');
    overlay.id = 'qr-import-overlay';
    overlay.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f0f0f;border-top:1px solid #c8a96e44;font-family:Georgia,serif;padding:20px 16px 32px;max-height:85vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.6);transition:transform 0.3s ease;transform:translateY(100%)';

    var existing = getCustomFoods().find(function(f) { return f.name.toLowerCase() === meal.name.toLowerCase(); });

    var ingredientsHtml = '';
    if (meal.ingredients && meal.ingredients.length) {
      ingredientsHtml = '<div style="margin-top:12px;border-top:1px solid #1e1e1e;padding-top:12px">';
      ingredientsHtml += '<div style="font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:8px">Složení</div>';
      meal.ingredients.forEach(function(ing) {
        var kcal = Math.round((ing.kcalPer100 || 0) * (ing.g || 0) / 100);
        ingredientsHtml += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:12px">';
        ingredientsHtml += '<span style="color:#d4cfc5">' + ing.name + ' <span style="color:#555">' + ing.g + 'g</span></span>';
        ingredientsHtml += '<span style="color:#c8a96e">' + kcal + ' kcal</span>';
        ingredientsHtml += '</div>';
      });
      ingredientsHtml += '</div>';
    }

    var warningHtml = existing
      ? '<div style="background:#f59e0b11;border:1px solid #f59e0b44;border-radius:3px;padding:8px 12px;font-size:12px;color:#f59e0b;margin-bottom:12px">⚠ Pokrm se stejným názvem již existuje. Uložením přepíšete stávající záznam.</div>'
      : '';

    overlay.innerHTML =
      '<div style="font-size:9px;letter-spacing:3px;color:#c8a96e;text-transform:uppercase;margin-bottom:14px">📱 Import pokrmu přes QR</div>' +
      warningHtml +
      '<div style="font-size:18px;color:#e8e3d5;font-weight:bold;margin-bottom:4px">' + meal.name + '</div>' +
      '<div style="font-size:26px;color:#c8a96e;font-weight:bold;margin-bottom:4px">' + meal.kcal + ' kcal</div>' +
      '<div style="font-size:11px;color:#555">celková porce</div>' +
      ingredientsHtml +
      '<div style="display:flex;gap:10px;margin-top:16px">' +
        '<button id="qr-save-btn" style="flex:2;padding:14px;background:#c8a96e;border:none;border-radius:3px;color:#0f0f0f;font-weight:bold;cursor:pointer;font-size:14px;font-family:Georgia,serif">' +
          (existing ? '↻ Přepsat v databázi' : '✓ Uložit do databáze') +
        '</button>' +
        '<button id="qr-close-btn" style="flex:1;padding:14px;background:none;border:1px solid #333;border-radius:3px;color:#666;cursor:pointer;font-size:14px;font-family:Georgia,serif">✕ Zavřít</button>' +
      '</div>';

    document.body.appendChild(overlay);

    // Animace zobrazení
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.style.transform = 'translateY(0)';
      });
    });

    function closeOverlay() {
      overlay.style.transform = 'translateY(100%)';
      setTimeout(function() { overlay.remove(); }, 300);
    }

    document.getElementById('qr-close-btn').addEventListener('click', closeOverlay);

    document.getElementById('qr-save-btn').addEventListener('click', function() {
      var foods = getCustomFoods();
      var newEntry = {
        id: Date.now(),
        name: meal.name,
        kcal: meal.kcal,
        unit: meal.unit || 'g',
        kcalPer100: meal.kcalPer100 || meal.kcal,
        category: meal.category || 'Vlastní',
        ingredients: meal.ingredients || []
      };
      if (existing) {
        foods = foods.map(function(f) {
          return f.name.toLowerCase() === meal.name.toLowerCase() ? newEntry : f;
        });
      } else {
        foods.push(newEntry);
      }
      saveCustomFoods(foods);
      document.getElementById('qr-save-btn').textContent = '✓ Uloženo!';
      document.getElementById('qr-save-btn').style.background = '#22c55e';
      setTimeout(closeOverlay, 1200);
    });
  })();
  </script>
