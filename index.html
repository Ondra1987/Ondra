                          <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{f.category} · {f.kcalPer100} kcal/100{f.unit === "ks" ? "g" : f.unit}</div>
                        </div>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => { if (f.isPokrm) { setPokrmNazev(f.name); setPokrmSuroviny((f.slozeni || []).map(s => ({ uid: Date.now() + Math.random(), name: s.name, kcalPer100: s.kcalPer100 || Math.round(s.kcal / s.qty * 100), unit: "g", qty: s.qty }))); setPokrmStep("sestavit"); setPokrmEditId(f.id); setView("pokrm"); } else { setEditingFood(f.id); setEditName(f.name); setEditKcal(String(f.kcalPer100)); setEditUnit(f.unit || "g"); setEditCategory(f.category || ""); setEditDefaultQty(f.defaultQty ? String(f.defaultQty) : ""); } }} style={{ background: "none", border: "1px solid #c8a96e44", borderRadius: 2, padding: "6px 10px", color: "#c8a96e", cursor: "pointer", fontSize: 12 }}>✏︎</button>
                          {f.id > 9000 && (
                            <button onClick={() => saveFoodDb(foodDb.filter(x => x.id !== f.id))} style={{ background: "none", border: "1px solid #ef444433", borderRadius: 2, padding: "6px 10px", color: "#ef4444", cursor: "pointer", fontSize: 12 }}>🗑</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {/* ===== HISTORY VIEW ===== */}
        {view === "history" && (
          <>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase", marginBottom: 16 }}>Posledních 14 dní</div>
            {historyDays.length === 0 && <div style={{ color: "#444", fontStyle: "italic" }}>Žádná data</div>}
            {historyDays.map(d => {
              const rec = records[d];
              const kcal = rec.meals?.reduce((s, m) => s + m.kcal, 0) || 0;
              const diff = kcal - DAILY_GOAL;
              return (
                <div key={d} onClick={() => { setActiveDate(d); setView("day"); }} style={{ background: "#131313", border: "1px solid #1e1e1e", borderRadius: 4, padding: "12px 16px", marginBottom: 6, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 14, color: "#e8e3d5" }}>{formatDate(d)}</div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{rec.meals?.length || 0} jídel{rec.steps ? ` · ${rec.steps.toLocaleString()} kroků` : ""}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 16, color: "#c8a96e" }}>{kcal} kcal</div>
                    <div style={{ fontSize: 11, color: diff > 200 ? "#ef4444" : diff < -200 ? "#22c55e" : "#888" }}>{diff > 0 ? `+${diff}` : diff} vs cíl</div>
                    {rec.weight && <div style={{ fontSize: 11, color: "#666" }}>{rec.weight.toFixed(1)} kg</div>}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* ===== DATA VIEW ===== */}
        {view === "data" && (
          <>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase", marginBottom: 16 }}>Záloha dat</div>

            {/* API klíč */}
            <div style={card}>
              <div style={cardHeader}>📱 Anthropic API klíč</div>
              <div style={{ padding: "16px" }}>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 12, lineHeight: 1.6 }}>
                  Potřebný pro AI odhad kalorií. Získáš ho na <span style={{ color: "#c8a96e" }}>console.anthropic.com</span>
                </div>
                <input
                  value={apiKeyInput}
                  onChange={e => setApiKeyInput(e.target.value)}
                  placeholder="sk-ant-..."
                  type="password"
                  style={{ ...inp, width: "100%", boxSizing: "border-box", marginBottom: 10, fontFamily: "monospace", fontSize: 13 }}
                />
                <button onClick={saveApiKey} style={{ width: "100%", padding: "12px", background: apiKeySaved ? "#22c55e" : "#c8a96e", border: "none", borderRadius: 3, color: "#0f0f0f", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>
                  {apiKeySaved ? "✓ Uloženo!" : "Uložit klíč"}
                </button>
                {apiKey && <div style={{ fontSize: 11, color: "#22c55e", marginTop: 8 }}>✓ Klíč je uložen ({apiKey.slice(0, 12)}...)</div>}
              </div>
            </div>

            {/* Export */}
            <div style={card}>
              <div style={cardHeader}>Export</div>
              <div style={{ padding: "16px" }}>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 14, lineHeight: 1.6 }}>Stáhni zálohu všech svých záznamů a vlastních potravin jako JSON soubor.</div>
                <button onClick={exportData} style={{ width: "100%", padding: "14px", background: "#c8a96e", border: "none", borderRadius: 3, color: "#0f0f0f", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>↓ Uložit soubor</button>
              </div>
            </div>

            {/* Import */}
            <div style={card}>
              <div style={cardHeader}>Import</div>
              <div style={{ padding: "16px" }}>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 14, lineHeight: 1.6 }}>Nahraj dříve exportovaný JSON soubor. Stávající záznamy budou přepsány.</div>
                <label style={{ display: "block", width: "100%", padding: "14px", background: "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 3, color: "#c8a96e", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif", textAlign: "center", boxSizing: "border-box" }}>
                  ↑ Nahrát zálohu
                  <input type="file" accept=".json" style={{ display: "none" }} onChange={importData} />
                </label>
              </div>
            </div>

            {/* Reset */}
            <div style={card}>
              <div style={cardHeader}>Reset dat</div>
              <div style={{ padding: "16px" }}>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 14, lineHeight: 1.6 }}>Smaže všechny záznamy. Tuto akci nelze vrátit.</div>
                {!confirmReset ? (
                  <button onClick={() => setConfirmReset(true)} style={{ width: "100%", padding: "12px", background: "transparent", border: "1px solid #ef444444", borderRadius: 3, color: "#ef4444", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>✕ Smazat všechna data</button>
                ) : (
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={resetData} style={{ flex: 1, padding: "12px", background: "#ef4444", border: "none", borderRadius: 3, color: "#fff", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>Ano, smazat</button>
                    <button onClick={() => setConfirmReset(false)} style={{ flex: 1, padding: "12px", background: "#1e1e1e", border: "1px solid #2a2a2a", borderRadius: 3, color: "#888", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>Zrušit</button>
                  </div>
                )}
              </div>
            </div>

            {/* Statistiky */}
            <div style={card}>
              <div style={cardHeader}>Statistiky</div>
              <div style={{ padding: "16px" }}>
                {[
                  ["Počet dní se záznamy", Object.keys(records).filter(d => records[d].meals?.length).length],
                  ["Celkem jídel", Object.values(records).reduce((s, d) => s + (d.meals?.length || 0), 0)],
                  ["Vlastní potraviny v databázi", foodDb.filter(f => f.id > 9000).length],
                ].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #1e1e1e" }}>
                    <span style={{ fontSize: 13, color: "#888" }}>{label}</span>
                    <span style={{ fontSize: 13, color: "#c8a96e", fontWeight: "bold" }}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {/* ===== CHARTS VIEW ===== */}
        {view === "charts" && (() => {
          const chartDays = allDates.filter(d => records[d].meals?.length || records[d].burned || records[d].weight || records[d].steps).slice(-14);
          const labels = chartDays.map(d => { const [,,day] = d.split("-"); return `${parseInt(day)}.`; });
          const kcalData = chartDays.map(d => records[d].meals?.reduce((s, m) => s + m.kcal, 0) || 0);
          const burnedData = chartDays.map(d => records[d].burned || 0);
          const stepsData = chartDays.map(d => records[d].steps || 0);
          const weightData = chartDays.map(d => records[d].weight || null);
          const hasBurned = burnedData.some(v => v > 0);

          const kcalColor = (v) => {
            if (!v) return "#2a2a2a";
            if (v > DAILY_GOAL) {
              const over = Math.min(1, (v - DAILY_GOAL) / (DAILY_GOAL * 0.5));
              return `rgba(${Math.round(200+over*55)},${Math.round(40-over*40)},${Math.round(40-over*40)},0.9)`;
            }
            const t = v / DAILY_GOAL;
            const r = Math.round(220 - (220-34)*t);
            const g = Math.round(40 + (197-40)*t);
            const b = Math.round(40 + (94-40)*t);
            return `rgba(${r},${g},${b},${0.7 + t*0.25})`;
          };
          const burnedColor = (burned, kcal) => {
            if (!burned) return "#2a2a2a";
            if (burned >= kcal) {
              const t = Math.min(1, (burned - kcal) / Math.max(kcal * 0.6, 1));
              return `rgba(${Math.round(20-t*10)},${Math.round(140+t*60)},${Math.round(200+t*30)},${0.65+t*0.3})`;
            }
            const t = Math.min(1, (1 - burned/Math.max(kcal,1)) / 0.6);
            return `rgba(${Math.round(200+t*55)},${Math.round(70-t*70)},${Math.round(50-t*50)},${0.65+t*0.3})`;
          };

          const totalKcalAll = kcalData.reduce((s,v) => s+v, 0);
          const totalBurned = burnedData.reduce((s,v) => s+v, 0);
          const netTotal = totalKcalAll - totalBurned;

          const validWeight = weightData.map((v, i) => v ? { v, i } : null).filter(Boolean);

          return (
            <>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase", marginBottom: 16 }}>Grafy – posledních 14 dní</div>

              {/* Kalorie chart */}
              <div style={card}>
                <div style={cardHeader}>Kalorie – přijato vs. spáleno</div>
                <div style={{ display: "flex", gap: 16, padding: "0 16px 10px", flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 22, height: 10, borderRadius: 2, background: "linear-gradient(90deg,#ef4444,#22c55e)" }} />
                    <span style={{ fontSize: 10, color: "#888" }}>Přijato (0→cíl)</span>
                  </div>
                  {hasBurned && <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 2, background: "linear-gradient(180deg,#0ea5e9,#ef4444)" }} />
                    <span style={{ fontSize: 10, color: "#888" }}>Spáleno</span>
                  </div>}
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 16, height: 2, background: "#c8a96e55", borderTop: "1px dashed #c8a96e55" }} />
                    <span style={{ fontSize: 10, color: "#888" }}>Cíl {DAILY_GOAL}</span>
                  </div>
                </div>
                <div style={{ padding: "0 16px 6px" }}>
                  <svg viewBox={`0 0 300 ${170}`} style={{ width: "100%", overflow: "visible" }}>
                    {(() => {
                      const H = 140, W = 300, groupPad = 3, barGap = 1;
                      const allVals = [...kcalData, ...burnedData].filter(v => v > 0);
                      const maxVal = Math.max(...allVals, DAILY_GOAL) * 1.15 || 1;
                      const n = kcalData.length;
                      const groupW = (W - groupPad * (n + 1)) / n;
                      const bW = hasBurned ? (groupW - barGap) / 2 : groupW;
                      return (
                        <>
                          <line x1={0} y1={H - (DAILY_GOAL/maxVal)*H} x2={W} y2={H - (DAILY_GOAL/maxVal)*H} stroke="#c8a96e" strokeWidth="1" strokeDasharray="4,3" strokeOpacity="0.5"/>
                          <text x={W-14} y={H-(DAILY_GOAL/maxVal)*H-1} textAnchor="middle" fontSize={7} fill="#c8a96e" fontWeight="bold">{DAILY_GOAL}</text>
                          {kcalData.map((kcal, i) => {
                            const burned = burnedData[i];
                            const gx = groupPad + i * (groupW + groupPad);
                            const kx = hasBurned ? gx : gx + (groupW - bW)/2;
                            const bx = kx + bW + barGap;
                            const kcalH = kcal / maxVal * H;
                            const burnedH = burned / maxVal * H;
                            const kc = kcalColor(kcal);
                            const bc = burnedColor(burned, kcal);
                            const net = burned > 0 ? kcal - burned : null;
                            const cx = hasBurned ? gx + groupW/2 : kx + bW/2;
                            return (
                              <g key={i}>
                                {kcal > 0 && <rect x={kx} y={H-kcalH} width={bW} height={kcalH} fill={kc} rx={2}/>}
                                {kcal > 0 && <text x={kx+bW/2} y={H-kcalH-3} textAnchor="middle" fontSize={6.5} fill={kc} fontWeight="bold">{kcal>=1000?`${(kcal/1000).toFixed(1)}k`:kcal}</text>}
                                {hasBurned && burned > 0 && <rect x={bx} y={H-burnedH} width={bW} height={burnedH} fill={bc} rx={2}/>}
                                {hasBurned && burned > 0 && <text x={bx+bW/2} y={H-burnedH-3} textAnchor="middle" fontSize={6.5} fill={bc} fontWeight="bold">{burned>=1000?`${(burned/1000).toFixed(1)}k`:burned}</text>}
                                <text x={cx} y={H+12} textAnchor="middle" fontSize={7.5} fill="#555">{labels[i]}</text>
                                {net !== null && (
                                  <text x={cx} y={H+22} textAnchor="middle" fontSize={6.5} fill={net<0?"#22c55e":net>300?"#ef4444":"#888"}>
                                    {net>0?`+${net}`:net}
                                  </text>
                                )}
                              </g>
                            );
                          })}
                        </>
                      );
                    })()}
                  </svg>
                </div>
                <div style={{ display: "flex", gap: 6, padding: "0 16px 14px" }}>
                  {[
                    { label: "Přijato", val: totalKcalAll, color: "#c8a96e" },
                    ...(hasBurned ? [
                      { label: "Spáleno", val: totalBurned, color: "#0ea5e9" },
                      { label: "Čistý příjem", val: netTotal, color: (() => { const t = Math.min(1, Math.abs(netTotal)/DAILY_GOAL); const neg = netTotal < 0; const r = neg ? Math.round(34+t*0) : Math.round(34+(239-34)*t); const g = neg ? Math.round(197-(197-68)*t) : Math.round(197-(197-68)*t); return `rgb(${r},${g},68)`; })() },
                    ] : []),
                  ].map(item => (
                    <div key={item.label} style={{ flex: 1, background: "#0f0f0f", border: "1px solid #1e1e1e", borderRadius: 3, padding: "8px 4px", textAlign: "center" }}>
                      <div style={{ fontSize: 13, fontWeight: "bold", color: item.color }}>{Math.abs(item.val)>=1000?`${(item.val/1000).toFixed(1)}k`:item.val}</div>
                      <div style={{ fontSize: 8, color: "#444", letterSpacing: 1, textTransform: "uppercase", marginTop: 2 }}>{item.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Kroky chart */}
              {(() => {
                const STEP_GOAL = 8000;
                const H = 120, W = 300, pad = 4;
                const maxVal = Math.max(...stepsData.filter(v => v > 0), STEP_GOAL) * 1.15 || 1;
                const barW = (W - pad * (stepsData.length + 1)) / stepsData.length;
                const stepColor = (v) => {
                  if (!v) return "#2a2a2a";
                  const ratio = v / STEP_GOAL;
                  if (ratio >= 1) {
                    const intensity = Math.min(1, (ratio - 1) / 0.25);
                    const r = Math.round(34 * (1 - intensity * 0.3));
                    const g = Math.round(100 + intensity * 97);
                    const b = Math.round(60 + intensity * 34);
                    const alpha = Math.round(120 + intensity * 135);
                    return `rgba(${r},${g},${b},${(alpha/255).toFixed(2)})`;
                  } else {
                    const intensity = Math.min(1, (1 - ratio) / 0.5);
                    const r = Math.round(180 + intensity * 75);
                    const g = Math.round(60 - intensity * 60);
                    const b = Math.round(60 - intensity * 60);
                    const alpha = Math.round(100 + intensity * 155);
                    return `rgba(${r},${g},${b},${(alpha/255).toFixed(2)})`;
                  }
                };
                return (
                  <div style={card}>
                    <div style={cardHeader}>Kroky · cíl {STEP_GOAL.toLocaleString()}</div>
                    <div style={{ padding: "6px 16px 14px" }}>
                      <svg viewBox={`0 0 ${W} ${H + 20}`} style={{ width: "100%", overflow: "visible" }}>
                        <line x1={0} y1={H - (STEP_GOAL / maxVal) * H} x2={W} y2={H - (STEP_GOAL / maxVal) * H} stroke="#ffffff22" strokeWidth="1" strokeDasharray="3,3" />
                        {stepsData.map((v, i) => {
                          const x = pad + i * (barW + pad);
                          const barH = v / maxVal * H;
                          const color = stepColor(v);
                          const ratio = v / STEP_GOAL;
                          return (
                            <g key={i}>
                              {v > 0 && <rect x={x} y={H - barH} width={barW} height={barH} fill={color} rx={2} />}
                              <text x={x + barW / 2} y={H + 14} textAnchor="middle" fontSize={8} fill="#555">{labels[i]}</text>
                              {v > 0 && <text x={x + barW / 2} y={H - barH - 3} textAnchor="middle" fontSize={7} fill={ratio >= 1 ? "#22c55ecc" : "#ef4444cc"}>
                                {v >= 1000 ? `${(v / 1000).toFixed(1)}k` : v}
                              </text>}
                            </g>
                          );
                        })}
                      </svg>
                    </div>
                  </div>
                );
              })()}

              {/* Hmotnost chart */}
              {validWeight.length >= 1 && (() => {
                const vals = validWeight.map(p => p.v);
                const minV = Math.min(...vals);
                const maxV = Math.max(...vals);
                const firstW = validWeight[0].v;
                const lastW = validWeight[validWeight.length - 1].v;
                const totalLoss = (firstW - lastW).toFixed(1);
                const goalW = 75;
                const W = 300, H = 140, padL = 36, padR = 10, padT = 16, padB = 28;
                const graphW = W - padL - padR;
                const graphH = H - padT - padB;
                const rangeMin = Math.min(minV, goalW) - 1;
                const rangeMax = maxV + 1;
                const rangeSpan = rangeMax - rangeMin || 1;
                const xPos = i => padL + (validWeight.length > 1 ? i / (validWeight.length - 1) * graphW : graphW / 2);
                const yPos = v => padT + graphH - (v - rangeMin) / rangeSpan * graphH;
                const linePts = validWeight.map((p, i) => `${xPos(i)},${yPos(p.v)}`).join(" ");
                const fillPath = `M${xPos(0)},${yPos(validWeight[0].v)} ` +
                  validWeight.map((p, i) => `L${xPos(i)},${yPos(p.v)}`).join(" ") +
                  ` L${xPos(validWeight.length - 1)},${H - padB} L${xPos(0)},${H - padB} Z`;
                const goalY = yPos(goalW);
                const startY = yPos(START_WEIGHT);
                return (
                  <div style={card}>
                    <div style={cardHeader}>Hmotnost</div>
                    <div style={{ display: "flex", gap: 8, padding: "0 16px 10px" }}>
                      {[
                        { label: "Aktuální", val: `${lastW} kg`, color: "#e8d5a3" },
                        { label: "Úbytek", val: totalLoss > 0 ? `↓${totalLoss} kg` : `+${Math.abs(totalLoss)} kg`, color: totalLoss > 0 ? "#22c55e" : "#ef4444" },
                        { label: "Do cíle", val: `${(lastW - goalW).toFixed(1)} kg`, color: "#888" },
                      ].map(item => (
                        <div key={item.label} style={{ flex: 1, background: "#0f0f0f", border: "1px solid #222", borderRadius: 3, padding: "8px 6px", textAlign: "center" }}>
                          <div style={{ fontSize: 14, fontWeight: "bold", color: item.color }}>{item.val}</div>
                          <div style={{ fontSize: 8, color: "#444", letterSpacing: 1, textTransform: "uppercase", marginTop: 2 }}>{item.label}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ padding: "0 16px 14px" }}>
                      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", overflow: "visible" }}>
                        <defs>
                          <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#c8a96e" stopOpacity="0.3" />
                            <stop offset="100%" stopColor="#c8a96e" stopOpacity="0.02" />
                          </linearGradient>
                        </defs>
                        {[...Array(5)].map((_, i) => {
                          const v = rangeMin + (rangeSpan / 4) * i;
                          const y = yPos(v);
                          return (
                            <g key={i}>
                              <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#1e1e1e" strokeWidth="1" />
                              <text x={padL - 4} y={y + 3} textAnchor="end" fontSize={7} fill="#444">{Math.round(v)}</text>
                            </g>
                          );
                        })}
                        {goalY >= padT && goalY <= H - padB && (
                          <g>
                            <line x1={padL} y1={goalY} x2={W - padR} y2={goalY} stroke="#22c55e33" strokeWidth="1" strokeDasharray="4,3" />
                            <text x={W - padR + 2} y={goalY + 3} fontSize={7} fill="#22c55e88">cíl</text>
                          </g>
                        )}
                        {startY >= padT && startY <= H - padB && (
                          <g>
                            <line x1={padL} y1={startY} x2={W - padR} y2={startY} stroke="#555533" strokeWidth="1" strokeDasharray="2,4" />
                            <text x={W - padR + 2} y={startY + 3} fontSize={7} fill="#66663388">start</text>
                          </g>
                        )}
                        {validWeight.length > 1 && <path d={fillPath} fill="url(#wGrad)" />}
                        {validWeight.length > 1 && (
                          <polyline points={linePts} fill="none" stroke="#c8a96e" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                        )}
                        {validWeight.map((p, i) => {
                          const cx = xPos(i);
                          const cy = yPos(p.v);
                          const isLast = i === validWeight.length - 1;
                          return (
                            <g key={i}>
                              <circle cx={cx} cy={cy} r={isLast ? 4 : 3} fill={isLast ? "#c8a96e" : "#c8a96e88"} />
                              {isLast && <circle cx={cx} cy={cy} r={7} fill="none" stroke="#c8a96e44" strokeWidth="1.5" />}
                              <text x={cx} y={cy - 8} textAnchor="middle" fontSize={isLast ? 8 : 7} fill={isLast ? "#e8d5a3" : "#777"} fontWeight={isLast ? "bold" : "normal"}>{p.v}</text>
                              <text x={cx} y={H - padB + 12} textAnchor="middle" fontSize={7} fill="#444">{labels[p.i]}</text>
                            </g>
                          );
                        })}
                      </svg>
                    </div>
                  </div>
                );
              })()}
            </>
          );
        })()}

        {/* ===== POKRM VIEW ===== */}
        {view === "pokrm" && (() => {
          const pokrmFiltered = foodDb.filter(f => norm(f.name).includes(norm(pokrmSearch)));
          const pokrmTotal = pokrmSuroviny.reduce((s, i) => s + Math.round(i.qty * i.kcalPer100 / 100), 0);
          const pokrmTotalG = pokrmSuroviny.reduce((s, i) => s + i.qty, 0);
          const pokrmPer100 = pokrmTotalG > 0 ? Math.round(pokrmTotal / pokrmTotalG * 100) : 0;

          const addSurovinu = (f) => {
            setPokrmSuroviny(prev => [...prev, { uid: Date.now() + Math.random(), name: f.name, kcalPer100: f.kcalPer100, unit: f.unit || "g", qty: f.defaultQty || "" }]);
            setPokrmSearch("");
            setPokrmStep("sestavit");
          };

          const updateQty = (uid, val) => {
            setPokrmSuroviny(prev => prev.map(s => s.uid === uid ? { ...s, qty: parseFloat(val.replace(",", ".")) || 0 } : s));
          };

          const removeSurovinu = (uid) => {
            setPokrmSuroviny(prev => prev.filter(s => s.uid !== uid));
          };

          const ulozitDoDB = () => {
            if (!pokrmNazev.trim() || pokrmSuroviny.length === 0) return;
            const slozeni = pokrmSuroviny.map(s => ({ name: s.name, qty: s.qty, kcalPer100: s.kcalPer100, kcal: Math.round(s.qty * s.kcalPer100 / 100) }));
            if (pokrmEditId) {
              saveFoodDb(foodDb.map(f => f.id === pokrmEditId ? { ...f, name: pokrmNazev.trim(), kcalPer100: pokrmPer100, defaultQty: pokrmTotalG, slozeni } : f));
              setPokrmEditId(null);
            } else {
              const newFood = { id: Date.now(), name: pokrmNazev.trim(), kcalPer100: pokrmPer100, unit: "g", category: "Pokrmy", defaultQty: pokrmTotalG, isPokrm: true, slozeni };
              saveFoodDb([...foodDb, newFood]);
            }
            setPokrmNazev(""); setPokrmSuroviny([]); setPokrmStep("sestavit");
            setView("db");
          };

          const pridatJenDnes = () => {
            if (!pokrmNazev.trim() || pokrmSuroviny.length === 0) return;
            const d = getDay(activeDate);
            d.meals = [...d.meals, {
              name: pokrmNazev.trim() + " " + pokrmTotalG + "g",
              kcal: pokrmTotal,
              slozeni: pokrmSuroviny.map(s => ({ name: s.name, qty: s.qty, kcal: Math.round(s.qty * s.kcalPer100 / 100) }))
            }];
            save({ ...records, [activeDate]: d });
            setPokrmNazev(""); setPokrmSuroviny([]); setPokrmStep("sestavit");
            setView("day");
          };

          return (
            <>
              {pokrmStep === "sestavit" && (
                <>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase" }}>Sestavit pokrm</div>
                    <button onClick={() => { setPokrmNazev(""); setPokrmSuroviny([]); setPokrmStep("sestavit"); setView("day"); }} style={{ background: "none", border: "none", color: "#555", fontSize: 18, cursor: "pointer", padding: 0 }}>✕</button>
                  </div>

                  <div style={{ background: "#131313", border: "1px solid #222", borderRadius: 4, marginBottom: 14, padding: "12px 16px" }}>
                    <div style={{ fontSize: 9, color: "#555", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6 }}>Název pokrmu</div>
                    <input value={pokrmNazev} onChange={e => setPokrmNazev(e.target.value)} placeholder="např. Ovesná kaše s proteinem" style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 2, padding: "9px 10px", color: "#e8e3d5", fontSize: 14, fontFamily: "Georgia, serif", outline: "none", width: "100%", boxSizing: "border-box" }} />
                  </div>

                  <div style={{ background: "#131313", border: "1px solid #222", borderRadius: 4, marginBottom: 14 }}>
                    <div style={{ padding: "10px 16px", borderBottom: "1px solid #1e1e1e", fontSize: 9, letterSpacing: 3, color: "#666", textTransform: "uppercase" }}>Suroviny</div>
                    <div style={{ padding: "0 16px" }}>
                      {pokrmSuroviny.length === 0 && <div style={{ padding: "16px 0", color: "#444", fontSize: 13, fontStyle: "italic", textAlign: "center" }}>Zatím žádné suroviny</div>}
                      {pokrmSuroviny.map(s => {
                        const kcal = Math.round(s.qty * s.kcalPer100 / 100);
                        return (
                          <div key={s.uid} style={{ display: "flex", alignItems: "center", gap: 6, padding: "10px 0", borderBottom: "1px solid #141414" }}>
                            <button onClick={() => removeSurovinu(s.uid)} style={{ background: "none", border: "none", color: "#333", fontSize: 14, cursor: "pointer", padding: "0 2px", flexShrink: 0 }}>✕</button>
                            <div style={{ flex: 1, fontSize: 13, color: "#e8e3d5" }}>{s.name}</div>
                            <input type="number" value={s.qty === 0 ? "" : s.qty} onChange={e => updateQty(s.uid, e.target.value)} style={{ width: 62, background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 2, padding: "6px", color: "#c8a96e", fontSize: 13, fontFamily: "Georgia, serif", textAlign: "center", outline: "none" }} />
                            <div style={{ fontSize: 11, color: "#555", minWidth: 52, textAlign: "right" }}>{kcal} kcal</div>
                          </div>
                        );
                      })}
                      <button onClick={() => setPokrmStep("hledat")} style={{ width: "100%", background: "rgba(200,169,110,0.04)", border: "1px dashed rgba(200,169,110,0.2)", borderRadius: 3, padding: "10px", color: "#555", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", margin: "10px 0" }}>+ Přidat surovinu z databáze</button>
                    </div>

                    {pokrmSuroviny.length > 0 && (
                      <div style={{ margin: "0 16px 16px", background: "#0f0f0f", border: "1px solid #1a1a1a", borderRadius: 3, padding: "10px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase" }}>Celkem</span>
                          <span style={{ fontSize: 28, fontWeight: "bold", color: "#c8a96e" }}>{pokrmTotal} kcal</span>
                        </div>
                        <div style={{ fontSize: 10, color: "#444", marginTop: 3 }}>{pokrmTotalG} g · {pokrmPer100} kcal/100g</div>
                      </div>
                    )}
                  </div>

                  {pokrmSuroviny.length > 0 && pokrmNazev.trim() && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      <button onClick={ulozitDoDB} style={{ width: "100%", background: "#c8a96e", border: "none", borderRadius: 2, padding: "13px", color: "#0f0f0f", fontWeight: "bold", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>✓ Uložit do databáze</button>
                      <button onClick={pridatJenDnes} style={{ width: "100%", background: "none", border: "1px solid rgba(200,169,110,0.3)", borderRadius: 2, padding: "13px", color: "#c8a96e", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>+ Přidat jen dnes</button>
                    </div>
                  )}
                </>
              )}

              {pokrmStep === "hledat" && (
                <>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                    <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase" }}>Přidat surovinu</div>
                  </div>
                  <div style={{ background: "#131313", border: "1px solid #222", borderRadius: 4, marginBottom: 14 }}>
                    <div style={{ padding: "12px 16px", borderBottom: "1px solid #1e1e1e" }}>
                      <input value={pokrmSearch} onChange={e => setPokrmSearch(e.target.value)} placeholder="Hledat v databázi…" autoFocus style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 2, padding: "9px 10px", color: "#e8e3d5", fontSize: 14, fontFamily: "Georgia, serif", outline: "none", width: "100%", boxSizing: "border-box" }} />
                    </div>
                    <div style={{ maxHeight: 400, overflowY: "auto" }}>
                      {pokrmSearch && pokrmFiltered.length === 0 && <div style={{ padding: "14px 16px", color: "#444", fontSize: 13, fontStyle: "italic" }}>Nenalezeno v databázi</div>}
                      {(pokrmSearch ? pokrmFiltered : foodDb.slice(0, 40)).map(f => (
                        <div key={f.id} onClick={() => addSurovinu(f)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 16px", borderBottom: "1px solid #141414", cursor: "pointer" }}>
                          <div>
                            <div style={{ fontSize: 13, color: "#e8e3d5" }}>{f.isPokrm ? "🍽 " : ""}{f.name}</div>
                            <div style={{ fontSize: 10, color: "#555", marginTop: 2 }}>{f.category} · {f.kcalPer100} kcal/100g</div>
                          </div>
                          <span style={{ fontSize: 22, color: "#333" }}>+</span>
                        </div>
                      ))}
                      {pokrmSearch && (
                        <div style={{ padding: "10px 16px", borderTop: "1px solid #1a1a1a" }}>
                          <button
                            onClick={async () => {
                              if (!pokrmSearch.trim()) return;
                              setPokrmAiLoading(true); setPokrmAiResult(null);
                              try {
                                const resp = await fetch("/api/claude", {
                                  method: "POST",
                                  headers: { "Content-Type": "application/json", ...(apiKey ? { "x-api-key": apiKey } : {}) },
                                  body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 200, messages: [{ role: "user", content: [{ type: "text", text: 'Jsi nutricni expert. Odhadni kcal pro surovinu: "' + pokrmSearch + '". Odpovez POUZE jako JSON: {"name":"nazev","kcalPer100":123,"unit":"g"}' }] }] })
                                });
                                const data = await resp.json();
                                const text = (data.content?.[0]?.text || "").replace(/```json|```/g, "").trim();
                                setPokrmAiResult(JSON.parse(text));
                              } catch { setPokrmAiResult({ error: true }); }
                              setPokrmAiLoading(false);
                            }}
                            disabled={pokrmAiLoading}
                            style={{ width: "100%", background: pokrmFiltered.length === 0 ? "#c8a96e" : "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 3, padding: "10px", color: pokrmFiltered.length === 0 ? "#0f0f0f" : "#c8a96e", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif", fontWeight: pokrmFiltered.length === 0 ? "bold" : "normal" }}
                          >{pokrmAiLoading ? "AI odhaduje…" : pokrmFiltered.length === 0 ? "✦ Odhadnout přes AI" : "✦ Raději odhadnout přes AI"}</button>
                          {pokrmAiResult && !pokrmAiResult.error && (
                            <div style={{ marginTop: 10, background: "#0f0f0f", border: "1px solid #c8a96e33", borderRadius: 3, padding: "12px" }}>
                              <div style={{ fontSize: 11, color: "#666", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>AI odhad</div>
                              <div style={{ fontSize: 14, color: "#e8d5a3", fontWeight: "bold", marginBottom: 2 }}>{pokrmAiResult.name}</div>
                              <div style={{ fontSize: 13, color: "#555", marginBottom: 10 }}>{pokrmAiResult.kcalPer100} kcal / 100g</div>
                              <div style={{ display: "flex", gap: 8 }}>
                                <button onClick={() => { const nf = { id: Date.now(), name: pokrmAiResult.name, kcalPer100: pokrmAiResult.kcalPer100, unit: pokrmAiResult.unit || "g", category: "Vlastní" }; saveFoodDb([...foodDb, nf]); addSurovinu(nf); setPokrmAiResult(null); }} style={{ flex: 1, background: "#c8a96e", border: "none", borderRadius: 2, padding: "10px", color: "#0f0f0f", fontWeight: "bold", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif" }}>✓ Uložit do DB a přidat</button>
                                <button onClick={() => { addSurovinu({ id: Date.now(), name: pokrmAiResult.name, kcalPer100: pokrmAiResult.kcalPer100, unit: pokrmAiResult.unit || "g", category: "Vlastní" }); setPokrmAiResult(null); }} style={{ background: "none", border: "1px solid #2a2a2a", borderRadius: 2, padding: "10px 12px", color: "#555", cursor: "pointer", fontSize: 13 }}>Jen přidat</button>
                              </div>
                            </div>
                          )}
                          {pokrmAiResult?.error && <div style={{ marginTop: 8, fontSize: 12, color: "#ef4444", textAlign: "center" }}>Chyba AI – zkus znovu</div>}
                        </div>
                      )}
                    </div>
                  </div>
                  <button onClick={() => { setPokrmSearch(""); setPokrmStep("sestavit"); }} style={{ width: "100%", background: "none", border: "1px solid #2a2a2a", borderRadius: 2, padding: "10px", color: "#555", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif" }}>↩ Zpět k pokrmu</button>
                </>
              )}
            </>
          );
        })()}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
