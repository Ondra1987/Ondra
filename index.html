  <div id="root"><div style="background:#0f0f0f;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#666;font-family:Georgia,serif;font-size:14px">Načítám…</div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env">
const { useState, useEffect } = React;

// inject db-search styles
if (!document.getElementById("db-search-style")) { const st = document.createElement("style"); st.id = "db-search-style"; st.textContent = ".db-search-input { transition: border-color 0.2s ease, box-shadow 0.2s ease; border: 2px solid #333 !important; font-size: 15px; padding: 13px 10px !important; } .db-search-input:focus { border-color: #c8a96e !important; box-shadow: 0 0 0 3px #c8a96e22, 0 0 14px #c8a96e22 !important; outline: none !important; }"; document.head.appendChild(st); }

const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

const DAILY_GOAL = 1600;
const START_WEIGHT = 107;
const HEIGHT_CM = 162;

const BMI = (w) => (w / ((HEIGHT_CM / 100) ** 2)).toFixed(1);
const today = () => new Date().toISOString().split("T")[0];
const formatDate = (d) => { const [y, m, day] = d.split("-"); return `${day}.${m}.${y}`; };
const emptyDay = (date) => ({ date, meals: [], steps: null, burned: null, weight: null });

const INITIAL_DATA = {};

// Výchozí databáze potravin
const FOOD_DB_DEFAULT = [
  {id:101,name:"Artyčoky",unit:"g",kcalPer100:41,category:"Zelenina"},
  {id:102,name:"Brambory rané",unit:"g",kcalPer100:72,category:"Zelenina"},
  {id:103,name:"Brokolice",unit:"g",kcalPer100:33,category:"Zelenina"},
  {id:104,name:"Cibule",unit:"g",kcalPer100:48,category:"Zelenina"},
  {id:105,name:"Mrkev",unit:"g",kcalPer100:45,category:"Zelenina"},
  {id:106,name:"Rajčata",unit:"g",kcalPer100:24,category:"Zelenina"},
  {id:107,name:"Okurka salátová",unit:"g",kcalPer100:17,category:"Zelenina"},
  {id:108,name:"Paprika zelená",unit:"g",kcalPer100:17,category:"Zelenina"},
  {id:109,name:"Špenát",unit:"g",kcalPer100:33,category:"Zelenina"},
  {id:110,name:"Žampiony",unit:"g",kcalPer100:17,category:"Zelenina"},

  {id:203,name:"Pomeranč",unit:"g",kcalPer100:48,category:"Ovoce"},
  {id:204,name:"Jahody",unit:"g",kcalPer100:43,category:"Ovoce"},
  {id:205,name:"Hruška",unit:"g",kcalPer100:67,category:"Ovoce"},
  {id:206,name:"Avokádo",unit:"g",kcalPer100:221,category:"Ovoce"},

  {id:302,name:"Hovězí zadní",unit:"g",kcalPer100:181,category:"Maso"},
  {id:303,name:"Vepřová kýta",unit:"g",kcalPer100:202,category:"Maso"},
  {id:304,name:"Losos čerstvý",unit:"g",kcalPer100:131,category:"Ryby"},
  {id:305,name:"Treska filé",unit:"g",kcalPer100:71,category:"Ryby"},
  {id:306,name:"Tuňák ve vl. šťávě",unit:"g",kcalPer100:110,category:"Ryby"},
  {id:401,name:"Vejce celé",unit:"ks",kcalPer100:135,gramsPerUnit:60,category:"Vejce"},
  {id:402,name:"Bílek",unit:"ks",kcalPer100:49,gramsPerUnit:35,category:"Vejce"},
  {id:501,name:"Mléko plnotučné",unit:"ml",kcalPer100:62,category:"Mléčné"},
  {id:502,name:"Jogurt bílý 0%",unit:"g",kcalPer100:45,category:"Mléčné"},
  {id:503,name:"Tvaroh bez tuku",unit:"g",kcalPer100:69,category:"Mléčné"},
  {id:504,name:"Cottage 20%",unit:"g",kcalPer100:109,category:"Mléčné"},
  {id:505,name:"Eidam 30%",unit:"g",kcalPer100:262,category:"Sýry"},
  {id:506,name:"Mozzarella 45%",unit:"g",kcalPer100:240,category:"Sýry"},
  {id:601,name:"Rýže vařená bílá",unit:"g",kcalPer100:124,category:"Přílohy"},
  {id:602,name:"Těstoviny vařené",unit:"g",kcalPer100:131,category:"Přílohy"},
  {id:603,name:"Brambory vařené",unit:"g",kcalPer100:69,category:"Přílohy"},
  {id:604,name:"Ovesné vločky",unit:"g",kcalPer100:352,category:"Cereálie"},
  {id:605,name:"Celozrnný chléb",unit:"g",kcalPer100:205,category:"Pečivo"},
  {id:606,name:"Bílý rohlík",unit:"ks",kcalPer100:250,gramsPerUnit:55,category:"Pečivo"},
  {id:701,name:"Olivový olej",unit:"ml",kcalPer100:881,category:"Tuky"},
  {id:702,name:"Máslo",unit:"g",kcalPer100:717,category:"Tuky"},
  {id:801,name:"Čočka suchá",unit:"g",kcalPer100:343,category:"Luštěniny"},
  {id:802,name:"Fazole suchá",unit:"g",kcalPer100:333,category:"Luštěniny"},
  {id:901,name:"Arašídy",unit:"g",kcalPer100:598,category:"Ořechy"},
  {id:902,name:"Mandle",unit:"g",kcalPer100:617,category:"Ořechy"},
  {id:1001,name:"Coca-cola",unit:"ml",kcalPer100:43,category:"Nápoje"},
  {id:1002,name:"Pivo světlé 12°",unit:"ml",kcalPer100:33,category:"Nápoje"},
  {id:1003,name:"Káva černá",unit:"ml",kcalPer100:2,category:"Nápoje"},
  {id:1101,name:"Čokoláda hořká",unit:"g",kcalPer100:507,category:"Sladkosti"},
  {id:1102,name:"Nutella",unit:"g",kcalPer100:531,category:"Sladkosti"},
  {id:1103,name:"Med",unit:"g",kcalPer100:324,category:"Sladkosti"},
];

function App() {
  const [records, setRecords] = useState({});
  const [activeDate, setActiveDate] = useState(today());
  const [mealInput, setMealInput] = useState("");
  const [kcalInput, setKcalInput] = useState("");
  const [weightInput, setWeightInput] = useState("");
  const [stepsInput, setStepsInput] = useState("");
  const [burnedInput, setBurnedInput] = useState("");
  const [view, setView] = useState("day");
  const [loading, setLoading] = useState(false);
  const [aiSuggestion, setAiSuggestion] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const [pokrmNazev, setPokrmNazev] = useState("");
  const [pokrmSuroviny, setPokrmSuroviny] = useState([]);
  const [pokrmSearch, setPokrmSearch] = useState("");
  const [pokrmStep, setPokrmStep] = useState("sestavit"); // sestavit | hledat
  const [pokrmEditId, setPokrmEditId] = useState(null);
  const [pokrmAiLoading, setPokrmAiLoading] = useState(false);
  const [pokrmAiResult, setPokrmAiResult] = useState(null);
  const [pokrmInputMode, setPokrmInputMode] = useState("g"); // "g" or "kcal"
  const [mealDetail, setMealDetail] = useState(null); // { name, slozeni }
  const [aiMealInput, setAiMealInput] = useState("");
  const [micListening, setMicListening] = useState(false);
  const [scannerOpen, setScannerOpen] = useState(false);
  const [aiMealLoading, setAiMealLoading] = useState(false);
  const [aiMealResult, setAiMealResult] = useState(null);
  const [aiMealState, setAiMealState] = useState(false); // false | "confirmDb" | "matchedQty" | "addNew"

  // Databáze potravin
  const [foodDb, setFoodDb] = useState(FOOD_DB_DEFAULT);
  const [editingFood, setEditingFood] = useState(null);
  const [editName, setEditName] = useState("");
  const [editKcal, setEditKcal] = useState("");
  const [editUnit, setEditUnit] = useState("g");
  const [editCategory, setEditCategory] = useState("");
  const [editDefaultQty, setEditDefaultQty] = useState("");
  const [dbSearch, setDbSearch] = useState("");
  const [dbCategory, setDbCategory] = useState("Vše");
  const [selectedFood, setSelectedFood] = useState(null);
  const [foodQty, setFoodQty] = useState("");
  // Přidání vlastní potraviny
  const [newFoodName, setNewFoodName] = useState("");
  const [newFoodUnit, setNewFoodUnit] = useState("g");
  const [newFoodKcal, setNewFoodKcal] = useState("");
  const [newFoodGrams, setNewFoodGrams] = useState("");
  const [newFoodCat, setNewFoodCat] = useState("Vlastní");
  const [newFoodCatNew, setNewFoodCatNew] = useState("");
  const [customCats, setCustomCats] = useState([]);

  const [apiKey, setApiKey] = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [apiKeySaved, setApiKeySaved] = useState(false);

  const fileHandle = React.useRef(null);

  const exportData = async () => {
    const json = JSON.stringify({ records, customFoods: foodDb.filter(f => f.id > 9000) }, null, 2);
    if (window.showSaveFilePicker) {
      try {
        if (!fileHandle.current) {
          fileHandle.current = await window.showSaveFilePicker({
            suggestedName: "anet-zaloha.json",
            types: [{ description: "JSON záloha", accept: { "application/json": [".json"] } }]
          });
        }
        const writable = await fileHandle.current.createWritable();
        await writable.write(json);
        await writable.close();
        alert("Záloha uložena!");
        return;
      } catch(e) {
        if (e.name !== "AbortError") fileHandle.current = null;
        else return;
      }
    }
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "anet-zaloha.json"; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.records) {
          save({ ...INITIAL_DATA, ...parsed.records });
          if (parsed.customFoods) saveFoodDb([...FOOD_DB_DEFAULT, ...parsed.customFoods]);
        } else {
          save({ ...INITIAL_DATA, ...parsed });
        }
        alert("Data byla úspěšně načtena!");
      } catch { alert("Chyba: soubor není platná záloha."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  useEffect(() => {
    const saved = localStorage.getItem("anet-tracker-v2");
    if (saved) { try { setRecords({ ...INITIAL_DATA, ...JSON.parse(saved) }); } catch { setRecords(INITIAL_DATA); } }
    else { setRecords(INITIAL_DATA); }
    const savedFoods = localStorage.getItem("anet-foods-v1");
    if (savedFoods) { try { const custom = JSON.parse(savedFoods); setFoodDb([...FOOD_DB_DEFAULT, ...custom]); } catch {} }
    const savedKey = localStorage.getItem("anet-api-key");
    if (savedKey) { setApiKey(savedKey); setApiKeyInput(savedKey); }
    const savedCats = localStorage.getItem("anet-custom-cats");
    if (savedCats) { try { setCustomCats(JSON.parse(savedCats)); } catch {} }
  }, []);

  const save = (r) => { setRecords(r); localStorage.setItem("anet-tracker-v2", JSON.stringify(r)); };
  const saveFoodDb = (db) => {
    const custom = db.filter(f => f.id > 9000);
    setFoodDb(db);
    localStorage.setItem("anet-foods-v1", JSON.stringify(custom));
  };
  const saveCustomCats = (cats) => { setCustomCats(cats); localStorage.setItem("anet-custom-cats", JSON.stringify(cats)); };

  const saveApiKey = () => {
    const k = apiKeyInput.trim();
    setApiKey(k);
    localStorage.setItem("anet-api-key", k);
    setApiKeySaved(true);
    setTimeout(() => setApiKeySaved(false), 2000);
  };

  const getDay = (date) => records[date] ? { ...emptyDay(date), ...records[date] } : emptyDay(date);

  const calcKcal = (food, qty) => {
    const q = parseFloat(qty);
    if (!q || isNaN(q)) return 0;
    return food.unit === "ks" && food.gramsPerUnit
      ? Math.round(q * food.gramsPerUnit * food.kcalPer100 / 100)
      : Math.round(q * food.kcalPer100 / 100);
  };

  const addMeal = () => {
    if (!mealInput.trim()) return;
    const d = getDay(activeDate);
    d.meals = [...d.meals, { name: mealInput.trim(), kcal: parseInt(kcalInput) || 0 }];
    save({ ...records, [activeDate]: d });
    setMealInput(""); setKcalInput("");
  };

  const addFoodFromDb = () => {
    if (!selectedFood || !foodQty) return;
    const kcal = calcKcal(selectedFood, foodQty);
    const d = getDay(activeDate);
    d.meals = [...d.meals, { name: `${selectedFood.name} ${foodQty} ${selectedFood.unit}`, kcal }];
    save({ ...records, [activeDate]: d });
    setSelectedFood(null); setFoodQty(""); setDbSearch("");
  };

  const removeMeal = (idx) => {
    const d = getDay(activeDate);
    d.meals = d.meals.filter((_, i) => i !== idx);
    save({ ...records, [activeDate]: d });
  };

  const updateGarmin = () => {
    const d = getDay(activeDate);
    if (stepsInput) d.steps = parseInt(stepsInput);
    if (burnedInput) d.burned = parseInt(burnedInput);
    save({ ...records, [activeDate]: d });
    setStepsInput(""); setBurnedInput("");
  };

  const updateWeight = () => {
    if (!weightInput) return;
    const d = getDay(activeDate);
    d.weight = parseFloat(weightInput.replace(",", "."));
    save({ ...records, [activeDate]: d });
    setWeightInput("");
  };

  const resetData = () => {
    localStorage.removeItem("anet-tracker-v2");
    setRecords(INITIAL_DATA);
    setConfirmReset(false);
  };

  const startMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Hlasové zadávání není v tomto prohlížeči podporováno."); return; }
    const rec = new SR();
    rec.lang = "cs-CZ";
    rec.continuous = false;
    rec.interimResults = false;
    rec.onstart = () => setMicListening(true);
    rec.onend = () => setMicListening(false);
    rec.onerror = () => setMicListening(false);
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript.trim();
      setDbSearch(text);
      setSelectedFood(null);
      setAiMealResult(null);
      setAiMealState(false);
      setTimeout(() => {
        const el = document.querySelector(".db-search-input");
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 200);
    };
    rec.start();
  };

  const startBarcodeScanner = () => {
    setScannerOpen(true);
  };

  // ===== QR IMPORT Z ONDRA DISPLAYJE =====
  const handleQrImport = (qrData) => {
    if (!qrData.startsWith("KALORIE:")) return false;
    try {
      const b64 = qrData.slice("KALORIE:".length);
      const json = atob(b64);
      const pokrm = JSON.parse(json);
      if (!pokrm.name || !pokrm.ingredients) return false;
      const suroviny = pokrm.ingredients.map(ing => ({
        uid: Date.now() + Math.random(),
        name: ing.name,
        kcalPer100: ing.kcalPer100,
        unit: "g",
        qty: ing.g || 0
      }));
      setPokrmNazev(pokrm.name);
      setPokrmSuroviny(suroviny);
      setPokrmStep("sestavit");
      setPokrmEditId(null);
      setView("pokrm");
      return true;
    } catch(e) { return false; }
  };

  const handleBarcodeFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setScannerOpen(false);
    try {
      if ("BarcodeDetector" in window) {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        await new Promise(r => { img.onload = r; });
        const canvas = document.createElement("canvas");
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext("2d").drawImage(img, 0, 0);
        URL.revokeObjectURL(img.src);
        const detector = new BarcodeDetector({ formats: ["qr_code", "ean_13", "ean_8", "upc_a", "upc_e", "code_128"] });
        const codes = await detector.detect(canvas);
        if (codes.length > 0) {
          // Zkus QR import z Ondra displayje jako první
          if (codes[0].rawValue.startsWith("KALORIE:")) {
            if (handleQrImport(codes[0].rawValue)) {
              e.target.value = "";
              return;
            }
          }
          const ean = codes[0].rawValue;
          // Search in internal DB by EAN
          const found = foodDb.find(f => f.ean === ean);
          if (found) {
            setSelectedFood(found);
            setFoodQty(found.defaultQty ? String(found.defaultQty) : "");
            setDbSearch(found.name);
          } else {
            // Try Open Food Facts API
            setDbSearch("Hledám EAN " + ean + "…");
            try {
              const res = await fetch("https://world.openfoodfacts.org/api/v0/product/" + ean + ".json");
              const data = await res.json();
              if (data.status === 1 && data.product) {
                const p = data.product;
                const name = p.product_name || p.product_name_cs || ean;
                const kcal = Math.round(p.nutriments?.["energy-kcal_100g"] || p.nutriments?.["energy_100g"] / 4.184 || 0);
                if (kcal > 0) {
                  setDbSearch(name);
                  setAiMealInput(name + " (EAN: " + ean + ")");
                  // Auto-add to DB and select
                  const newFood = { id: Date.now(), name, unit: "g", kcalPer100: kcal, category: "Skenované", ean };
                  saveFoodDb([...foodDb, newFood]);
                  setSelectedFood(newFood);
                  setFoodQty("");
                } else {
                  setDbSearch(name);
                }
              } else {
                setDbSearch("");
                alert("Produkt s EAN " + ean + " nebyl nalezen. Zkus zadat ručně.");
              }
            } catch {
              setDbSearch("");
              alert("Kód: " + ean + " – nelze načíst online databázi. Zkus zadat ručně.");
            }
          }
        } else {
          alert("Čárový kód nebyl rozpoznán. Zkus nafotit znovu.");
        }
      } else {
        alert("Čtečka čárových kódů není v tomto prohlížeči podporována.");
      }
    } catch (err) {
      alert("Chyba čtečky: " + err.message);
    }
  };

  const estimateMeal = async () => {
    if (!aiMealInput.trim()) return;
    setAiMealLoading(true);
    setAiMealResult(null);
    setAiMealState(false);
    try {
      const resp = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(apiKey ? { "x-api-key": apiKey } : {}) },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 200,
          messages: [{ role: "user", content: [{ type: "text", text: `Jsi nutriční expert. Odhadni přesný počet kalorií pro toto jídlo: "${aiMealInput}". Vycházej z USDA a českých nutričních tabulek. Odpověz POUZE jako JSON bez markdown: {"name":"název s množstvím","kcal":123,"baseName":"základní název bez množství","kcalPer100":123,"unit":"g"}` }] }]
        })
      });
      const data = await resp.json();
      if (data.error) { setAiMealResult({ error: data.error.message }); setAiMealLoading(false); return; }
      const text = (data.content?.[0]?.text || "").trim();
      const match = text.match(/\{[^{}]*\}/);
      if (!match) { setAiMealResult({ error: "Zkus znovu." }); setAiMealLoading(false); return; }
      const parsed = JSON.parse(match[0]);
      // Check if food exists in DB
      const baseName = (parsed.baseName || parsed.name || "").toLowerCase();
      const matched = foodDb.find(f =>
        norm(f.name).includes(norm(baseName.split(" ")[0])) ||
        norm(baseName).includes(norm(f.name.split(" ")[0]))
      );
      setAiMealResult({ ...parsed, inDb: !!matched, matchedFood: matched });
      if (matched) setAiMealState("confirmDb");
    } catch (e) { setAiMealResult({ error: e.message }); }
    setAiMealLoading(false);
  };

  const confirmAiMeal = () => {
    if (!aiMealResult?.name) return;
    const d = getDay(activeDate);
    d.meals = [...d.meals, { name: aiMealResult.name, kcal: aiMealResult.kcal || 0 }];
    save({ ...records, [activeDate]: d });
    setAiMealInput(""); setAiMealResult(null); setAiMealState(false);
  };

  const askAI = async () => {
    const d = getDay(activeDate);
    const totalKcal = d.meals.reduce((s, m) => s + m.kcal, 0);
    setLoading(true); setAiSuggestion("");
    try {
      const resp = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(apiKey ? { "x-api-key": apiKey } : {}) },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: [{ type: "text", text: `Jmenuji se Anet, vážím ${d.weight || START_WEIGHT} kg, výška 162 cm, cíl zhubnout. Denní cíl kalorií: 1500 kcal. Dnes jsem snědla: ${d.meals.map(m => `${m.name} (${m.kcal} kcal)`).join(", ") || "nic"}. Celkem: ${totalKcal} kcal. ${d.burned ? `Spálila jsem ${d.burned} kcal pohybem.` : ""} Dej mi krátký (3-5 vět) praktický tip na zbytek dne – co ještě sníst, jak jsem na tom, případně motivaci. Odpověz česky, stručně a přátelsky.` }] }]
        })
      });
      const data = await resp.json();
      setAiSuggestion(data.content?.[0]?.text || "Nepodařilo se získat tip.");
    } catch { setAiSuggestion("Chyba při komunikaci s AI."); }
    setLoading(false);
  };

  const day = getDay(activeDate);
  const totalKcal = day.meals.reduce((s, m) => s + m.kcal, 0);
  const balance = day.burned ? totalKcal - day.burned : null;
  const diff = totalKcal - DAILY_GOAL;
  const diffColor = (() => {
    const absDiff = Math.abs(diff);
    const ratio = Math.min(1, absDiff / DAILY_GOAL);
    const r = Math.round(34 + (239 - 34) * ratio);
    const g = Math.round(197 - (197 - 68) * ratio);
    const b = Math.round(94 - (94 - 68) * ratio);
    return `rgb(${r},${g},${b})`;
  })();
  const allDates = Object.keys(records).sort();
  const latestWeight = allDates.reduceRight((acc, d) => acc || records[d].weight, null) || START_WEIGHT;
  const weightLoss = (START_WEIGHT - latestWeight).toFixed(1);
  const historyDays = allDates.filter(d => records[d].meals?.length || records[d].weight).slice(-14).reverse();

  // Databáze - kategorie
  const allCategories = ["Vše", ...Array.from(new Set([...customCats, ...foodDb.map(f => f.category)]))];
  const filteredFoods = foodDb.filter(f =>
    norm(f.name).includes(norm(dbSearch)) &&
    (dbCategory === "Vše" || f.category === dbCategory)
  );

  // Styles
  const inp = { background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 2, padding: "8px 10px", color: "#e8e3d5", fontSize: 14, fontFamily: "Georgia, serif", outline: "none" };
  const card = { background: "#131313", border: "1px solid #222", borderRadius: 4, marginBottom: 14 };
  const cardHeader = { padding: "11px 16px", borderBottom: "1px solid #1e1e1e", fontSize: 10, letterSpacing: 3, color: "#666", textTransform: "uppercase" };

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", color: "#e8e3d5", fontFamily: "Georgia, serif" }}>
      {/* Header */}
      <div className="app-header" style={{ background: "linear-gradient(135deg, #1a1a1a 0%, #111 100%)", borderBottom: "1px solid #2a2a2a", padding: "16px 16px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: 4, color: "#666", textTransform: "uppercase", marginBottom: 4 }}>Hubnouc dení ded</div>
            <div style={{ fontSize: 26, fontWeight: "bold", color: "#f5f0e8" }}>Anet</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 28, fontWeight: "bold", color: "#e8e3d5" }}>{typeof latestWeight === "number" ? latestWeight.toFixed(1) : latestWeight} kg</div>
            <div style={{ fontSize: 12, color: weightLoss > 0 ? "#22c55e" : "#666" }}>
              {weightLoss > 0 ? `↓${weightLoss} kg` : "Počáteční váha"} · BMI {BMI(latestWeight)}
            </div>
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, marginBottom: 5, textTransform: "uppercase" }}>
            Postup · cíl 75 kg · zbývá {(latestWeight - 75).toFixed(1)} kg
          </div>
          <div style={{ background: "#1e1e1e", borderRadius: 3, height: 5, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${Math.min(100, Math.max(0, (START_WEIGHT - latestWeight) / (START_WEIGHT - 75) * 100))}%`, background: "linear-gradient(90deg, #c8a96e, #e8d5a3)", borderRadius: 3 }} />
          </div>
        </div>
        {/* Tabs */}
        <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
          {[["day", "Záznamy"], ["db", "DB"], ["history", "Historie"], ["charts", "Grafy"], ["data", "⚙ Data"]].map(([v, label]) => (
            <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "7px 2px", borderRadius: 2, border: "1px solid", borderColor: view === v ? "#c8a96e" : "#333", background: view === v ? "#c8a96e11" : "transparent", color: view === v ? "#c8a96e" : "#666", fontSize: 9, letterSpacing: 0.5, textTransform: "uppercase", cursor: "pointer", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px", maxWidth: 640, margin: "0 auto" }}>

        {/* ===== DAY VIEW ===== */}
        {view === "day" && (
          <>
            {/* Date selector */}
            <div style={{ position: "sticky", top: 0, zIndex: 10, background: "#0f0f0f", padding: "10px 0", marginBottom: 14, marginLeft: -16, marginRight: -16, paddingLeft: 16, paddingRight: 16, borderBottom: "1px solid #1a1a1a" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <button onClick={() => { const d = new Date(activeDate); d.setDate(d.getDate() - 1); setActiveDate(d.toISOString().split("T")[0]); }} style={{ background: "#1e1e1e", border: "1px solid #2a2a2a", color: "#888", padding: "6px 12px", borderRadius: 2, cursor: "pointer" }}>‹</button>
                <input type="date" value={activeDate} onChange={e => setActiveDate(e.target.value)} style={{ flex: 1, background: "transparent", border: "none", color: "#e8e3d5", fontSize: 15, textAlign: "center", cursor: "pointer", fontFamily: "Georgia, serif" }} />
                <button onClick={() => { const d = new Date(activeDate); d.setDate(d.getDate() + 1); setActiveDate(d.toISOString().split("T")[0]); }} style={{ background: "#1e1e1e", border: "1px solid #2a2a2a", color: "#888", padding: "6px 12px", borderRadius: 2, cursor: "pointer" }}>›</button>
                <button onClick={() => setActiveDate(today())} style={{ padding: "6px 10px", borderRadius: 2, border: "1px solid", borderColor: activeDate === today() ? "#c8a96e" : "#2a2a2a", background: activeDate === today() ? "#c8a96e11" : "transparent", color: activeDate === today() ? "#c8a96e" : "#666", fontSize: 10, cursor: "pointer" }}>Dnes</button>
              </div>
            </div>

            {/* Kalorie summary */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
              {[{ label: "Přijato", val: totalKcal, color: (() => {
                  if (diff >= 0) return "#ef4444";
                  const ratio = totalKcal / DAILY_GOAL;
                  const r = Math.round(239 - (239 - 34) * ratio);
                  const g = Math.round(68 + (197 - 68) * ratio);
                  const b = Math.round(68 + (94 - 68) * ratio);
                  return `rgb(${r},${g},${b})`;
                })() }, { label: "Cíl", val: DAILY_GOAL, color: "#888" }, { label: diff > 0 ? "Nad cílem" : "Pod cílem", val: Math.abs(diff), color: diffColor }].map(item => (
                <div key={item.label} style={{ background: "#151515", border: "1px solid #222", borderRadius: 4, padding: "12px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 20, fontWeight: "bold", color: item.color }}>{item.val}</div>
                  <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>{item.label}</div>
                </div>
              ))}
            </div>

            {/* Vyhledávání – DB + AI */}
            <div style={card}>
              <div style={cardHeader}>✦ Vyhledávání potravin</div>
              <div style={{ padding: "12px 16px" }}>
                <div style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <button onClick={startMic} style={{ flex: 1, background: micListening ? "#ef4444" : "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 4, color: micListening ? "#fff" : "#c8a96e", cursor: "pointer", fontSize: 14, padding: "10px", lineHeight: 1, transition: "all 0.2s", fontFamily: "Georgia, serif" }}>{micListening ? "⏹ Nahrávám…" : "🎤 Mikrofon"}</button>
                    <label htmlFor="barcode-input" style={{ flex: 1, background: "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 4, color: "#c8a96e", cursor: "pointer", fontSize: 14, padding: "10px", lineHeight: 1, textAlign: "center", fontFamily: "Georgia, serif" }}>{"📷 Skenovat kód"}<input id="barcode-input" type="file" accept="image/*" capture="environment" onChange={handleBarcodeFile} style={{ display: "none" }} /></label>
                  </div>
                  <button onClick={() => { setPokrmNazev(""); setPokrmSuroviny([]); setPokrmStep("sestavit"); setView("pokrm"); }} style={{ width: "100%", background: "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 4, color: "#c8a96e", cursor: "pointer", fontSize: 14, padding: "10px", lineHeight: 1, fontFamily: "Georgia, serif", marginBottom: 0 }}>🍽 Sestavit pokrm</button>
                  <div>
                  </div>
                  <div style={{ position: "relative" }}>
                    <input
                      className="db-search-input"
                      value={dbSearch}
                      onChange={e => { setDbSearch(e.target.value); setSelectedFood(null); setAiMealResult(null); setAiMealState(false); }}
                      onFocus={e => { setTimeout(() => { e.target.scrollIntoView({ behavior: "smooth", block: "start" }); }, 300); }}
                      placeholder="Hledat potravinu nebo popsat jídlo…"
                      style={{ ...inp, width: "100%", boxSizing: "border-box", paddingRight: dbSearch ? "32px" : "10px", background: "#1e1e1e", fontSize: 15, padding: "13px 32px 13px 12px" }}
                    />
                    {dbSearch && (
                      <button onClick={() => { setDbSearch(""); setSelectedFood(null); setAiMealInput(""); setAiMealResult(null); setAiMealState(false); }} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 18, padding: "2px", lineHeight: 1 }}>×</button>
                    )}
                  </div>
                </div>

                {/* DB výsledky */}
                {dbSearch && !selectedFood && (
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ maxHeight: 240, overflowY: "auto", border: "1px solid #2a2a2a", borderRadius: 3, background: "#1c1c1c" }}>
                      {filteredFoods.length === 0 ? (
                        <div style={{ padding: "10px 14px", color: "#555", fontSize: 13, fontStyle: "italic" }}>Nenalezeno v databázi</div>
                      ) : (
                        filteredFoods.map(f => (
                          <div key={f.id} onClick={() => { setSelectedFood(f); setFoodQty(f.defaultQty ? String(f.defaultQty) : ""); }} style={{ padding: "11px 14px", borderBottom: "1px solid #2a2a2a", cursor: "pointer", background: selectedFood?.id === f.id ? "#c8a96e22" : "transparent", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span style={{ fontSize: 14, color: "#ccc" }}>{f.isPokrm ? "🍽 " : ""}{f.name}</span>
                            <span style={{ fontSize: 11, color: "#777", flexShrink: 0, marginLeft: 8 }}>{f.kcalPer100} kcal/100{f.unit === "ks" ? "g" : f.unit}</span>
                          </div>
                        ))
                      )}
                    </div>
                    {/* AI tlačítko */}
                    <button
                      onClick={() => { setAiMealInput(dbSearch); estimateMeal(); }}
                      disabled={aiMealLoading}
                      style={{ marginTop: 8, width: "100%", background: filteredFoods.length === 0 ? "#c8a96e" : "#1e1e1e", border: "1px solid #c8a96e44", borderRadius: 3, padding: "10px", color: filteredFoods.length === 0 ? "#0f0f0f" : "#c8a96e", cursor: "pointer", fontSize: 13, fontWeight: filteredFoods.length === 0 ? "bold" : "normal", fontFamily: "Georgia, serif" }}
                    >
                      {aiMealLoading ? "AI odhaduje…" : filteredFoods.length === 0 ? "✦ Odhadnout kalorie přes AI" : "✦ Raději odhadnout přes AI"}
                    </button>
                  </div>
                )}

                {/* Vybraná potravina z DB */}
                {selectedFood && !aiMealResult && (
                  <div style={{ background: "#1a1a1a", border: "1px solid #c8a96e33", borderRadius: 3, padding: "12px 14px" }}>
                    <div style={{ fontSize: 14, color: "#c8a96e", marginBottom: 10, fontWeight: "bold" }}>{selectedFood.isPokrm ? "🍽 " : ""}{selectedFood.name}</div>

                    {selectedFood.isPokrm && selectedFood.slozeni ? (() => {
                      const base = selectedFood.defaultQty || 100;
                      const baseKcal = Math.round(selectedFood.kcalPer100 * base / 100);
                      const inputVal = parseFloat((foodQty || "").replace(",",".")) || 0;
                      const ratio = pokrmInputMode === "g"
                        ? (inputVal > 0 ? inputVal / base : 1)
                        : (inputVal > 0 ? inputVal / baseKcal : 1);
                      const finalQty = pokrmInputMode === "g" ? (inputVal || base) : Math.round(base * ratio);
                      const finalKcal = Math.round(selectedFood.kcalPer100 * finalQty / 100);
                      return (
                        <>
                          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                            <button onClick={() => { setPokrmInputMode("g"); setFoodQty(""); }} style={{ flex: 1, background: pokrmInputMode === "g" ? "#c8a96e" : "#1a1a1a", border: "1px solid #c8a96e44", borderRadius: 3, padding: "8px", color: pokrmInputMode === "g" ? "#0f0f0f" : "#c8a96e", fontWeight: pokrmInputMode === "g" ? "bold" : "normal", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif" }}>Zadat gramy</button>
                            <button onClick={() => { setPokrmInputMode("kcal"); setFoodQty(""); }} style={{ flex: 1, background: pokrmInputMode === "kcal" ? "#c8a96e" : "#1a1a1a", border: "1px solid #c8a96e44", borderRadius: 3, padding: "8px", color: pokrmInputMode === "kcal" ? "#0f0f0f" : "#c8a96e", fontWeight: pokrmInputMode === "kcal" ? "bold" : "normal", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif" }}>Zadat kcal</button>
                          </div>
                          <div style={{ fontSize: 11, color: "#555", marginBottom: 6 }}>
                            {pokrmInputMode === "g" ? `Hmotnost (g) – výchozí ${base}g = ${baseKcal} kcal` : `Kalorie – výchozí ${baseKcal} kcal = ${base}g`}
                          </div>
                          <input inputMode="decimal" value={foodQty} onChange={e => setFoodQty(e.target.value)} placeholder={pokrmInputMode === "g" ? `${base} g` : `${baseKcal} kcal`} autoFocus style={{ ...inp, width: "100%", boxSizing: "border-box", marginBottom: 8, fontSize: 16 }} />
                          {inputVal > 0 && (
                            <div style={{ fontSize: 20, color: "#c8a96e", fontWeight: "bold", textAlign: "center", marginBottom: 10 }}>
                              {pokrmInputMode === "g" ? `= ${finalKcal} kcal` : `= ${finalQty} g`}
                            </div>
                          )}
                          <div style={{ background: "#0f0f0f", border: "1px solid #1a1a1a", borderRadius: 3, padding: "0 10px", marginBottom: 10 }}>
                            {selectedFood.slozeni.map((s, i) => {
                              const adjQty = Math.round(s.qty * ratio);
                              const adjKcal = Math.round(s.kcal * ratio);
                              return (
                                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: i < selectedFood.slozeni.length - 1 ? "1px solid #141414" : "none" }}>
                                  <span style={{ fontSize: 12, color: "#d4cfc5" }}>{s.name}</span>
                                  <span style={{ fontSize: 11, color: "#666" }}>{adjQty}g · {adjKcal} kcal</span>
                                </div>
                              );
                            })}
                          </div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => {
                              if (!finalQty) return;
                              const d = getDay(activeDate);
                              d.meals = [...d.meals, {
                                name: selectedFood.name + " " + finalQty + "g",
                                kcal: finalKcal,
                                slozeni: selectedFood.slozeni.map(s => ({ name: s.name, qty: Math.round(s.qty * ratio), kcal: Math.round(s.kcal * ratio) }))
                              }];
                              save({ ...records, [activeDate]: d });
                              setSelectedFood(null); setFoodQty(""); setDbSearch(""); setPokrmInputMode("g");
                            }} style={{ flex: 1, background: "#22c55e", border: "none", borderRadius: 3, padding: "12px", color: "#0f0f0f", fontWeight: "bold", cursor: "pointer", fontSize: 14 }}>+ Přidat do jídel</button>
                            <button onClick={() => { setSelectedFood(null); setFoodQty(""); setPokrmInputMode("g"); }} style={{ background: "none", border: "1px solid #2a2a2a", borderRadius: 3, padding: "12px 14px", color: "#555", cursor: "pointer", fontSize: 13 }}>↩</button>
                          </div>
                        </>
                      );
                    })() : (
                      <>
                        <input inputMode="decimal" value={foodQty} onChange={e => setFoodQty(e.target.value)} onKeyDown={e => e.key === "Enter" && addFoodFromDb()} placeholder={`Množství (${selectedFood.unit})`} autoFocus style={{ ...inp, width: "100%", boxSizing: "border-box", marginBottom: 8, fontSize: 16 }} />
                        {foodQty > 0 && <div style={{ fontSize: 22, color: "#c8a96e", fontWeight: "bold", textAlign: "center", marginBottom: 8 }}>= {calcKcal(selectedFood, foodQty)} kcal</div>}
                        <div style={{ display: "flex", gap: 8 }}>
                          <button onClick={addFoodFromDb} disabled={!foodQty} style={{ flex: 1, background: foodQty ? "#22c55e" : "#2a2a2a", border: "none", borderRadius: 3, padding: "12px", color: foodQty ? "#0f0f0f" : "#555", fontWeight: "bold", cursor: foodQty ? "pointer" : "default", fontSize: 14 }}>+ Přidat do jídel</button>
                          <button onClick={() => { setSelectedFood(null); setFoodQty(""); }} style={{ background: "none", border: "1px solid #2a2a2a", borderRadius: 3, padding: "12px 14px", color: "#555", cursor: "pointer", fontSize: 13 }}>↩</button>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {/* AI výsledek – žádná shoda v DB */}
                {aiMealResult && !aiMealResult.error && aiMealState === false && (() => {
                  const baseName = aiMealResult.baseName || aiMealResult.name || "";
                  return (
                  <div style={{ background: "#1a1a1a", border: "1px solid #c8a96e33", borderRadius: 3, padding: "12px 14px" }}>
                    <div style={{ fontSize: 11, color: "#666", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>AI odhad</div>
                    <div style={{ fontSize: 13, color: "#d4cfc5", marginBottom: 4 }}>{baseName}</div>
                    <div style={{ fontSize: 13, color: "#555", marginBottom: 12 }}>{aiMealResult.kcalPer100 ? `${aiMealResult.kcalPer100} kcal / 100${aiMealResult.unit || "g"}` : `${aiMealResult.kcal} kcal celkem`}</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => { setAiMealState("aiQty"); setFoodQty(""); }} style={{ flex: 1, background: "#22c55e22", border: "1px solid #22c55e44", borderRadius: 3, padding: "11px", color: "#22c55e", cursor: "pointer", fontSize: 14, fontFamily: "Georgia, serif" }}>✓ Zadat množství</button>
                      <button onClick={() => { setAiMealResult(null); setAiMealState(false); }} style={{ background: "none", border: "1px solid #2a2a2a", borderRadius: 3, padding: "11px 14px", color: "#555", cursor: "pointer", fontSize: 14 }}>✕</button>
                    </div>
                    <button onClick={() => { setAiMealState("addNew"); setNewFoodName(baseName); setNewFoodKcal(String(aiMealResult.kcalPer100 || "")); setNewFoodUnit(aiMealResult.unit || "g"); }} style={{ marginTop: 8, width: "100%", background: "none", border: "1px solid #c8a96e33", borderRadius: 3, padding: "9px", color: "#c8a96e", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif" }}>+ Uložit do databáze</button>
                  </div>
                  );
                })()}

                {/* AI – zadat množství */}
                {aiMealResult && !aiMealResult.error && aiMealState === "aiQty" && (() => {
                  const baseName = aiMealResult.baseName || aiMealResult.name || "";
                  const unit = aiMealResult.unit || "g";
                  const kcalPer100 = aiMealResult.kcalPer100 || 0;
                  const qty = parseFloat(foodQty);
                  const computedKcal = qty > 0 && kcalPer100 ? Math.round(qty * kcalPer100 / 100) : null;
                  return (
                  <div style={{ background: "#131313", border: "1px solid #22c55e44", borderRadius: 3, padding: "14px", display: "flex", flexDirection: "column", gap: 10 }}>
                    <div style={{ fontSize: 11, color: "#22c55e", letterSpacing: 2, textTransform: "uppercase" }}>Zadat množství</div>
                    <div style={{ fontSize: 14, color: "#e8d5a3", fontWeight: "bold" }}>{baseName}</div>
                    <div style={{ fontSize: 11, color: "#555" }}>{kcalPer100} kcal / 100 {unit}</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input value={foodQty} onChange={e => setFoodQty(e.target.value)} placeholder={`Množství (${unit})`} inputMode="decimal" autoFocus style={{ ...inp, flex: 1, minWidth: 0, fontSize: 18 }} />
                      <span style={{ fontSize: 13, color: "#666", flexShrink: 0 }}>{unit}</span>
                    </div>
                    {computedKcal !== null && <div style={{ fontSize: 28, color: "#c8a96e", fontWeight: "bold", textAlign: "center" }}>= {computedKcal} kcal</div>}
                    <div style={{ display: "flex", gap: 6 }}>

          <>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", textTransform: "uppercase", marginBottom: 16 }}>Kalorické tabulky – {foodDb.length} potravin</div>

                <div style={{ display: "flex", gap: 8 }}>

                            setEditingFood(null);

                        </div>

                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px" }}>
